name: Quality Gate

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Show environment info
        run: |
          echo "=== Node & npm versions ==="
          node --version
          npm --version
          echo ""
          echo "=== Available package.json scripts ==="
          node -e "const p = require('./package.json'); console.log(Object.keys(p.scripts || {}).join('\n'))"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Typecheck (if configured)
        run: |
          if node -e "const p = require('./package.json'); process.exit(p.scripts && p.scripts.typecheck ? 0 : 1)"; then
            echo "typecheck script found — running..."
            npm run typecheck
          else
            echo "⚠️  typecheck script not found in package.json — skipping."
          fi

  smoke-summary:
    name: smoke-summary
    runs-on: ubuntu-latest
    needs: quality-gate
    if: success()

    steps:
      - name: Summary
        run: |
          echo "================================"
          echo "  QUALITY GATE — RESULTS"
          echo "================================"
          echo "  build      : OK"
          echo "  lint       : OK"
          echo "  typecheck  : OK / skipped"
          echo "================================"
          echo "  All checks passed. Ready to merge."
          echo "================================"